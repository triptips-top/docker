services:
  playwright:
    image: mcr.microsoft.com/playwright/mcp
    container_name: playwright
    networks:
      - n8n
    restart: unless-stopped
    init: true
    entrypoint: node
    command: >
      /app/cli.js
      --headless
      --browser chromium
      --no-sandbox
      --host 0.0.0.0
      --port 8931
      --allowed-hosts *
      --shared-browser-context

networks:
  n8n:
    external: true
